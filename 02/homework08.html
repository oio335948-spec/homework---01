<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homework08</title>
</head>
<body>
    <fieldset>
    <legend><b>Personal information</b></legend>
    <form action="/submit" method="post">

       <label for="name">Name:</label>
       <input type="text" id="name" name="name" required placeholder="Enter your name:"><br><br>
       
       <label for="email">Email:</label>
       <input type="email" id="email" name="email" required placeholder="Enter your email:"><br><br>
       
       <label for="password">Password:</label>
       <input type="password" id="password" name="password" required placeholder="Enter your password:"><br><br>
   
       <label for="message">Message:</label>
       <textarea id="message" name="message" rows="2" cols="67"></textarea>
       <br><br>


       <select id="country" name="country" required placeholder="enter your country">
        <option value="">Select your country</option>
           <option value="kz">Kazakhstan</option>
           <option value="cn">China</option>
           <option value="us">United States</option>
           
       </select><br><br>

       <button type="submit">Submit</button>
       <button type="reset">Reset</button>
     </form></fieldset>
</body>
</html>
